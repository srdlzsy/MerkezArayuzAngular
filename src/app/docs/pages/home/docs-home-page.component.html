<section class="hero">
  <div class="hero-copy">
    <span class="eyebrow">Overview</span>
    <h2>Hosgeldiniz</h2>
    <p></p>
  </div>

  <div class="hero-metrics">
    <article>
      <strong>{{ apiCount() }}</strong>
      <span>Gorev sayfasi</span>
    </article>
  </div>
</section>

<section class="grid">
  <article class="group-card" *ngFor="let group of navGroups()">
    <span class="eyebrow">{{ group.label }}</span>
    <h3>{{ group.label }}</h3>
    <p>{{ group.summary }}</p>
    <a class="jump-link" [routerLink]="getFirstRoute(group.children)">Ilk gorevi ac</a>

    <div class="chips">
      <span *ngFor="let label of getPreviewLabels(group.children)">{{ label }}</span>
    </div>
  </article>
</section>
