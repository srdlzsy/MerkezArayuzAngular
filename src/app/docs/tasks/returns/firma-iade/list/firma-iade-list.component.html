<section class="task-page" *ngIf="page as current">
  <header class="hero">
    <div class="welcome-box">
      <h2>{{ current.title }}</h2>
    </div>
  </header>

  <section class="task-block">

    <article class="query-card">
      <div class="query-grid">
        <label class="field">
          <span>Baslangic Tarihi</span>
          <input
            type="date"
            [value]="startDate()"
            (input)="updateStartDate($any($event.target).value ?? '')"
          />
        </label>

        <label class="field">
          <span>Bitis Tarihi</span>
          <input
            type="date"
            [value]="endDate()"
            (input)="updateEndDate($any($event.target).value ?? '')"
          />
        </label>

        <button type="button" class="task-action task-action-secondary query-create" (click)="openCreate()">
          Olustur
        </button>

        <button type="button" class="task-action task-action-primary query-submit" (click)="loadRows()" [disabled]="isLoading()">
          {{ isLoading() ? 'Yukleniyor...' : 'Listele' }}
        </button>
      </div>
    </article>

    <article class="state-card state-card-error" *ngIf="errorMessage() as errorMessage">
      <h3>Liste Yuklenemedi</h3>
      <p>{{ errorMessage }}</p>
    </article>

    <article class="state-card" *ngIf="isLoading()">
      <h3>Liste Yukleniyor</h3>
      <p>Secilen tarih araligi icin firma iade listesi getiriliyor.</p>
    </article>

    <app-api-list-table *ngIf="!isLoading() && rows().length" [rows]="rows()" [columns]="tableColumns" (rowAction)="openDetail($event)"></app-api-list-table>

    <article class="state-card" *ngIf="!isLoading() && !errorMessage() && !rows().length">
      <h3>Kayit Bulunamadi</h3>
      <p>Secilen tarih araliginda firma iade kaydi bulunmuyor.</p>
    </article>
  </section>
</section>
