<section class="task-page" *ngIf="page as current">
  <header class="hero">
    <div class="welcome-box">
      <h2>{{ current.title }}</h2>
    </div>
  </header>

  <section class="task-block">
    <article class="query-card">
      <div class="query-grid query-grid-difference">
        <label class="field">
          <span>Baslangic Tarihi</span>
          <input
            type="date"
            [value]="startDate()"
            (input)="updateStartDate($any($event.target).value ?? '')"
          />
        </label>

        <label class="field">
          <span>Bitis Tarihi</span>
          <input
            type="date"
            [value]="endDate()"
            (input)="updateEndDate($any($event.target).value ?? '')"
          />
        </label>

        <label class="field warehouse-field" *ngIf="isAdminUser(); else lockedWarehouse">
          <span>Depo No</span>
          <input
            type="number"
            min="1"
            inputmode="numeric"
            [value]="adminWarehouseNo()"
            placeholder="Tum"
            (input)="updateAdminWarehouseNo($any($event.target).value ?? '')"
          />
        </label>

        <ng-template #lockedWarehouse>
          <div class="warehouse-scope-pill" title="JWT deposu">
            <span>Depo</span>
            <strong>{{ selectedWarehouseLabel() }}</strong>
          </div>
        </ng-template>

        <div class="scope-field">
          <span>Kapsam</span>
          <div class="scope-segmented" role="group" aria-label="Mal kabul farklari kapsami">
            <button
              type="button"
              class="scope-option"
              *ngFor="let option of scopeOptions"
              [class.is-active]="scope() === option.value"
              [attr.aria-pressed]="scope() === option.value"
              (click)="updateScope(option.value)"
            >
              {{ option.label }}
            </button>
          </div>
        </div>

        <button
          type="button"
          class="task-action task-action-primary query-submit"
          (click)="loadRows()"
          [disabled]="isLoading()"
        >
          {{ isLoading() ? 'Yukleniyor...' : 'Listele' }}
        </button>
      </div>
    </article>

    <article class="state-card state-card-error" *ngIf="errorMessage() as errorMessage">
      <h3>{{ getErrorTitle() }}</h3>
      <p>{{ errorMessage }}</p>
    </article>

    <article class="state-card" *ngIf="isLoading()">
      <h3>{{ getLoadingTitle() }}</h3>
      <p>{{ getLoadingMessage() }}</p>
    </article>

    <app-api-list-table
      *ngIf="!isLoading() && rows().length"
      [rows]="rows()"
      [columns]="tableColumns"
      [actionLabel]="actionLabel"
      [filterPlaceholder]="getTableFilterPlaceholder()"
      (rowAction)="openDetail($event)"
    ></app-api-list-table>

    <article class="state-card" *ngIf="!isLoading() && !errorMessage() && !rows().length">
      <h3>{{ getEmptyTitle() }}</h3>
      <p>{{ getEmptyMessage() }}</p>
    </article>
  </section>
</section>
