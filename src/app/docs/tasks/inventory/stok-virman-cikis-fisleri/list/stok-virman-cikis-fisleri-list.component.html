<section class="task-page" *ngIf="page as current">
  <header class="hero">
    <div class="welcome-box">
      <h2>{{ current.title }}</h2>
    </div>
  </header>

  <section class="task-block">
    <div class="task-toolbar">
      <div class="task-title">{{ current.listTitle }}</div>
      <div class="task-actions">
        <button type="button" class="task-action task-action-secondary" (click)="openDetail()">Detay</button>
        <button type="button" class="task-action task-action-primary" (click)="openCreate()">Olustur</button>
      </div>
    </div>

    <div class="task-list">
      <article class="task-item" *ngFor="let item of current.items">
        <div class="task-item-head">
          <h4>{{ item.name }}</h4>
        </div>

        <div class="table-wrap" *ngIf="item.endpoints?.length">
          <table>
            <thead>
              <tr>
                <th>Method</th>
                <th>Path</th>
                <th>Aciklama</th>
                <th>Payload</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let endpoint of item.endpoints">
                <td>{{ endpoint.method }}</td>
                <td>{{ endpoint.path }}</td>
                <td>{{ endpoint.description }}</td>
                <td>{{ endpoint.payload || '-' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </article>
    </div>
  </section>
</section>
